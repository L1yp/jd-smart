get_device_snapshot:
  name: 查询设备快照
  description: 调用小京鱼 getDeviceSnapshot_v1，返回设备状态快照（带返回值，可在开发者工具里查看）。
  fields:
    device_id:
      name: device_id
      description: 设备 device_id（query 里那个，例如 0123456789abcdef0123456789abcdef）。
      required: true
      example: 0123456789abcdef0123456789abcdef
      selector:
        text:
    feed_id:
      name: feed_id
      description: 设备 feed_id（body 里那个长整数）。
      required: true
      example: "100000000000000000"
      selector:
        text:

control_device:
  name: 控制设备
  description: 调用小京鱼 controlDevice_v1 下发控制；返回执行后的最新 streams。两种入参二选一——stream_id+value（单条），或 command 数组（多条）。
  fields:
    feed_id:
      name: feed_id
      description: 目标设备 feed_id（已在集成里选过的设备）。
      required: true
      example: "576841753861489755"
      selector:
        text:
    stream_id:
      name: stream_id
      description: 要控制的流 ID（单条写法，与 value 搭配）。例如 Power / Wind / Mode / Vertical。
      required: false
      example: Vertical
      selector:
        text:
    value:
      name: value
      description: 写入的码值（单条写法）。开关 0/1；多档枚举填档位码（如 Mode 婴儿风=4）；数值流填数字。
      required: false
      example: 1
      selector:
        text:
    command:
      name: command（多条）
      description: "原始命令数组，一次写多条流，形如 [{\"stream_id\": \"Power\", \"current_value\": 1}, {\"stream_id\": \"Wind\", \"current_value\": 10}]。"
      required: false
      example: '[{"stream_id": "Power", "current_value": 1}]'
      selector:
        object:

get_device_model:
  name: 查询设备物模型（诊断）
  description: 拉取该设备的彩虹 getDeviceDetails 物模型，返回原始响应 + 解析结果 + 可控归类。用于排查「为什么只生成了 Power 开关」——若 control_map 缺 Mode/Wind/摆头 等，说明运行时 getDeviceDetails 没返回物模型、静默回退了 card_meta（card_control 只标 Power 可控）。
  fields:
    feed_id:
      name: feed_id
      description: 目标设备 feed_id（已在集成里选过的设备）。例如电风扇的 feed_id。
      required: true
      example: "576841753861489755"
      selector:
        text:
